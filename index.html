<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milhar Milionária do Guinho</title>
    <style>
        :root {
            --amarelo: #FFC107;
            --vermelho: #FF0000;
            --verde-claro: #E8F5E9;
            --verde-escuro: #2E7D32;
            --azul-fundo: #B0C4DE;
            --botao-share: #25D366;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--azul-fundo);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Cabeçalho Principal */
        .header-main {
            background-color: var(--amarelo);
            width: 100%;
            max-width: 1000px;
            text-align: center;
            padding: 20px 0;
            border: 2px solid #000;
            margin-bottom: 20px;
        }

        .header-main h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
        }

        /* Container de Conteúdo */
        .container {
            display: flex;
            flex-direction: row;
            gap: 20px;
            width: 100%;
            max-width: 1000px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Lado Esquerdo: Input */
        .card-input {
            width: 300px;
            border: 2px solid #000;
            flex-shrink: 0;
            background: white;
        }

        .input-title {
            background-color: var(--vermelho);
            color: white;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            font-size: 14px;
        }

        .input-area {
            padding: 20px;
            text-align: center;
        }

        #milhar-input {
            width: 100%;
            border: none;
            font-size: 45px;
            font-weight: bold;
            color: var(--verde-escuro);
            text-align: center;
            outline: none;
            font-family: 'Courier New', Courier, monospace;
        }

        .bicho-info-footer {
            background-color: #2ecc71;
            display: flex;
            justify-content: space-around;
            padding: 10px;
            font-weight: bold;
            border-top: 2px solid #000;
        }

        /* Lado Direito: Tabela */
        .card-tabela {
            flex-grow: 1;
            border: 2px solid #000;
            background-color: white;
            min-width: 320px;
        }

        .tabela-title {
            background-color: var(--amarelo);
            text-align: center;
            padding: 12px;
            font-weight: bold;
            font-size: 16px;
            border-bottom: 2px solid #000;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #2ecc71;
            color: white;
            padding: 10px;
            border: 1px solid #000;
        }

        th.col-grupos { background-color: var(--vermelho); width: 25%; }

        td {
            border: 1px solid #000;
            text-align: center;
            padding: 15px 5px;
            font-weight: bold;
            font-size: 18px;
        }

        .td-grupo {
            background-color: var(--verde-escuro);
            color: white;
        }

        tr:nth-child(even) td:not(.td-grupo) { background-color: var(--verde-claro); }

        /* Botão Compartilhar */
        .share-container {
            margin-top: 30px;
            width: 100%;
            max-width: 1000px;
            text-align: center;
        }

        .btn-share {
            background-color: var(--botao-share);
            color: white;
            border: 2px solid #128C7E;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .btn-share:active {
            transform: scale(0.95);
        }

        /* Rodapé Assinatura */
        .footer-assinatura {
            margin-top: 30px;
            padding: 20px;
            font-size: 16px;
            font-weight: bold;
            color: #2c3e50;
            text-align: center;
            width: 100%;
            font-style: italic;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .container { flex-direction: column; align-items: center; }
            .card-input { width: 100%; max-width: 320px; }
            .card-tabela { width: 100%; }
            td, th { font-size: 14px; padding: 10px 2px; }
            .header-main h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="header-main">
        <h1>MILHAR MILIONÁRIA DO GUINHO</h1>
    </div>

    <div class="container">
        <div class="card-input">
            <div class="input-title">DIGITE A MILHAR DA<br>ÚLTIMA EXTRAÇÃO</div>
            <div class="input-area">
                <input type="tel" id="milhar-input" maxlength="4" placeholder="0000" autocomplete="off">
            </div>
            <div class="bicho-info-footer" id="bicho-info">
                <span id="info-num">--</span>
                <span id="info-nome">AGUARDANDO</span>
            </div>
        </div>

        <div class="card-tabela">
            <div class="tabela-title">MELHORES MILHARES A SEREM JOGADAS</div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th class="col-grupos">Grupos</th>
                            <th>Milhares 1</th>
                            <th>Milhares 2</th>
                            <th>Milhares 3</th>
                            <th>Milhares 4</th>
                        </tr>
                    </thead>
                    <tbody id="resultado-corpo"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="share-container">
        <button class="btn-share" onclick="compartilharResultados()">
            📤 COMPARTILHAR MILHARES
        </button>
    </div>

    <footer class="footer-assinatura">
        Criado por Guinho Do Bicho
    </footer>

<script>
    const bichoNomes = ["Avestruz", "Águia", "Burro", "Borboleta", "Cachorro", "Cabra", "Carneiro", "Camelo", "Cobra", "Coelho", "Cavalo", "Elefante", "Galo", "Gato", "Jacaré", "Leão", "Macaco", "Porco", "Pavão", "Peru", "Touro", "Tigre", "Urso", "Veado", "Vaca"];

    const puxadas = {
        1: [18, 19, 20, 2], 2: [1, 3, 5, 4], 3: [2, 4, 6, 5], 4: [3, 5, 7, 6], 5: [4, 6, 8, 7],
        6: [5, 7, 9, 8], 7: [6, 8, 10, 9], 8: [7, 9, 11, 10], 9: [18, 19, 20, 10], 10: [9, 11, 13, 12],
        11: [10, 12, 14, 13], 12: [11, 13, 15, 14], 13: [12, 14, 16, 15], 14: [13, 15, 17, 16], 15: [14, 16, 18, 17],
        16: [15, 17, 19, 18], 17: [16, 18, 20, 19], 18: [17, 19, 21, 20], 19: [18, 20, 22, 21], 20: [19, 21, 23, 22],
        21: [20, 22, 24, 23], 22: [21, 23, 25, 24], 23: [22, 24, 1, 25], 24: [23, 25, 2, 1], 25: [24, 1, 3, 2]
    };

    const input = document.getElementById('milhar-input');
    const infoNum = document.getElementById('info-num');
    const infoNome = document.getElementById('info-nome');
    const corpoTabela = document.getElementById('resultado-corpo');

    function atualizarPuxada() {
        let milhar = input.value;
        if (milhar.length < 2) {
            corpoTabela.innerHTML = "";
            infoNum.innerText = "--";
            infoNome.innerText = "AGUARDANDO";
            return;
        }

        let dezena = parseInt(milhar.slice(-2));
        let grupo = Math.ceil(dezena / 4);
        if (dezena === 0) grupo = 25;
        if (isNaN(grupo)) return;

        infoNum.innerText = grupo.toString().padStart(2, '0');
        infoNome.innerText = bichoNomes[grupo - 1].toUpperCase();

        corpoTabela.innerHTML = "";
        let listaParaMostrar = puxadas[grupo] || [1, 2, 3, 4];

        listaParaMostrar.forEach(g => {
            let nomeBicho = bichoNomes[g - 1].toUpperCase();
            let tr = document.createElement('tr');
            
            let milhares = [];
            for(let i=0; i<4; i++) {
                let dz;
                if (g === 25) { 
                    const dezenasVaca = ["97", "98", "99", "00"];
                    dz = dezenasVaca[Math.floor(Math.random() * 4)];
                } else {
                    dz = (g * 4 - Math.floor(Math.random() * 4)).toString().padStart(2, '0');
                }
                milhares.push(`${Math.floor(Math.random() * 90 + 10)}${dz}`);
            }

            tr.innerHTML = `
                <td class="td-grupo">${g.toString().padStart(2, '0')}<br>${nomeBicho}</td>
                ${milhares.map(m => `<td>${m}</td>`).join('')}
            `;
            corpoTabela.appendChild(tr);
        });
    }

    async function compartilharResultados() {
        const milharDigitada = input.value;
        if (!milharDigitada) {
            alert("Digite uma milhar primeiro!");
            return;
        }

        let texto = `🍀 *MILHAR MILIONÁRIA DO GUINHO* 🍀\n\n`;
        texto += `Milhar da Extração: *${milharDigitada}*\n`;
        texto += `Bicho: ${infoNome.innerText}\n\n`;
        texto += `🚀 *SUGESTÕES DE PUXADA:*\n\n`;

        const linhas = document.querySelectorAll('#resultado-corpo tr');
        linhas.forEach(linha => {
            const cells = linha.querySelectorAll('td');
            const bichoInfo = cells[0].innerText.replace('\n', ' ');
            texto += `*${bichoInfo}*:\n`;
            texto += `${cells[1].innerText} - ${cells[2].innerText} - ${cells[3].innerText} - ${cells[4].innerText}\n\n`;
        });

        texto += `Boa sorte! 💰\n_Criado por Guinho Do Bicho_`;

        if (navigator.share) {
            try {
                await navigator.share({ title: 'Milhar do Guinho', text: texto });
            } catch (err) { console.log("Erro ao compartilhar"); }
        } else {
            navigator.clipboard.writeText(texto);
            alert("Resultados copiados! Cole no WhatsApp.");
        }
    }

    input.addEventListener('input', () => {
        if (input.value.length > 4) input.value = input.value.slice(0, 4);
        atualizarPuxada();
    });

    window.onload = () => input.focus();
</script>
</body>
</html>
